<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Roblox Revenue Estimator</title>
<meta name="description" content="Paste a Roblox game URL or place ID to estimate its revenue." />

<style>
  :root {
    --bg: #0f1115;
    --fg: #e7e7ea;
    --muted: #8a8f98;
    --border: #23262d;
    --accent: #ffffff;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  main { max-width: 560px; margin: 0 auto; padding: 96px 24px; }
  h1 { font-size: 20px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
  .sub { color: var(--muted); margin: 8px 0 32px; }
  form { display: flex; gap: 8px; }
  input {
    flex: 1; padding: 10px 12px; font: inherit; color: var(--fg);
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    outline: none;
  }
  input:focus { border-color: #555; }
  button {
    padding: 10px 16px; font: inherit; font-weight: 500;
    background: var(--accent); color: #0f1115; border: 0; border-radius: 6px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .err { color: var(--danger); margin-top: 16px; }
  section { margin-top: 48px; }
  .game { display: flex; align-items: center; gap: 12px; }
  .game img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
  .game h2 { font-size: 16px; font-weight: 500; margin: 0; }
  .game p { font-size: 12px; color: var(--muted); margin: 2px 0 0; }
  .group { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
  .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .row:last-child { margin-bottom: 0; }
  .lbl { color: var(--muted); }
  .val { font-variant-numeric: tabular-nums; }
  .big .val { font-size: 20px; font-weight: 500; color: var(--fg); }
  .mid .val { color: var(--muted); }
  .small { font-size: 12px; }
  .small .lbl, .small .val { color: var(--muted); }
  footer { margin-top: 64px; font-size: 11px; color: var(--muted); }
</style>
</head>

<body>
<main>
  <h1>Roblox revenue estimator</h1>
  <p class="sub">Paste a game link or place ID.</p>

  <form id="f">
    <input id="q" placeholder="roblox.com/games/920587237" autocomplete="off" />
    <button id="btn" type="submit">Estimate</button>
  </form>

  <div id="err" class="err" hidden></div>
  <section id="out" hidden></section>

  <footer>
    Estimates use public stats and a community-standard heuristic (DevEx $3.50 / 1000 R$). Real earnings vary.
  </footer>
</main>

<!-- IMPORTANT: ES MODULE ENTRY POINT -->
<script type="module" src="./js/main.js"></script>
</body>
</html>
