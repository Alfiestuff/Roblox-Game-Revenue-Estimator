<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Roblox Revenue Estimator</title>

<style>
  body { background:#0f1115; color:#fff; font-family:system-ui; }
  main { max-width:600px; margin:80px auto; padding:20px; }

  input, button {
    padding:10px;
    border-radius:6px;
    border:1px solid #333;
  }

  button { background:#fff; color:#000; }

  .group { margin-top:30px; }
  .row { display:flex; justify-content:space-between; margin:6px 0; }

  canvas { width:100%; margin-top:10px; }
</style>
</head>

<body>
<main>
  <h1>Roblox Revenue Estimator</h1>

  <form id="f">
    <input id="q" placeholder="game link or place id" />
    <button id="btn">Estimate</button>
  </form>

  <div id="err" hidden></div>
  <section id="out" hidden></section>
</main>

<script type="module" src="./scr/js/main.js"></script>
</body>
</html>
